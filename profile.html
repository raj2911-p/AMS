<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet" href="css/profile.css">

</head>

<body>

<h2>👤 My Profile</h2>

<div class="profile-container">

<div class="photo-section">
    <div class="img-wrapper">
        <div class="loader" id="imgLoader">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <img id="profilePreview" class="profile-img" style="display:none;">
    </div>

    <input type="file" id="photoInput" accept="image/*" hidden>

    <div class="photo-btns">
        <button class="upload" onclick="document.getElementById('photoInput').click()"><img src="upload.png"></button>
        <button class="remove" onclick="removePhoto()"><img src="remove.png"></button>
    </div>
</div>

<div class="profile-card" style="align-items: center; align-content: center;">

<div class="form-group">
<label>Faculty Name</label>
<input id="name" disabled>
</div>

<div class="form-group">
<label>Mobile No</label>
<input id="mobile" disabled>
</div>

<div class="form-group">
<label>Email</label>
<input id="email" disabled>
</div>

<div class="form-group">
<label>Username</label>
<input id="username" disabled>
</div>

<div class="form-group">
<label>Password</label>
<input id="password" type="password" disabled>
<small id="passStrength" style="font-weight:bold;"></small>
</div>

<div class="form-group">
<label>Role</label>
<input id="role" disabled>
</div>

<div class="form-group">
<label>Courses</label>
<input id="courses" disabled>
</div>

<div class="btn-group">
<button id="editBtn" onclick="enableEdit()">✏ Edit</button>
<button id="updateBtn" onclick="updateProfile()" disabled>Update</button>
</div>

<p id="msg"></p>

</div>

</div>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
  document.getElementById("footer").innerHTML = data
})
</script>

<script src="js/config.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
