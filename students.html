<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Students</title>

<link rel="stylesheet" href="css/students_style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<a href="dashboard.html" class="logo-card">
    <img src="logo.png" alt="Logo">
</a>

<div class="title">
Attendance Management System
</div>

<div class="nav-links">

<a href="dashboard.html">Dashboard</a>
<a href="students.html" class="active">Students</a>
<a href="batches.html">Batches</a>

</div>

</div>


<!-- MAIN CONTENT -->

<div class="container">

<h1 class="page-title">
Students Management
</h1>


<div class="student-layout">


<!-- STUDENT FORM -->

<div class="student-form">

<h2>Add New Student</h2>

<input id="studentName" placeholder="Student Name">

<input type="date" id="studentDob" placeholder="Date of Birth">

<input id="studentPhone" placeholder="Mobile Number">

<input id="studentEmail" placeholder="Email Address">

<button class="create-btn" onclick="addStudent()">
Create Student
</button>

</div>



<!-- STUDENT TABLE -->
<div class="student-table">

<div class="table-header">

  <h2>Students List</h2>

  <div class="actions">
    <input 
      type="text" 
      id="studentSearchMain" 
      placeholder="Search students...">

    <button class="export-btn" onclick="exportStudentPDF()">
      <b>Export PDF</b>
    </button>
  </div>

</div>

<table>

<thead>

<tr>
<th>Students Name</th>
<th>Date of Birth</th>
<th>Mobile No.</th>
<th>Email-ID</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


</div>

</div>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
  document.getElementById("footer").innerHTML = data
})
</script>

<script src="js/config.js"></script>
<script src="js/students.js"></script>

<script>

if(!localStorage.getItem("user")){
window.location="index.html"
}

</script>

</body>
</html>
