<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Batch Details</title>

<link rel="stylesheet" href="css/batches-details_style.css">

</head>

<body>

<div class="navbar">

<a href="dashboard.html" class="logo-card">
    <img src="logo.png" alt="Logo">
</a>

<div class="title">
Attendance Management System
</div>

<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="batches.html">Batches</a>
</div>

</div>


<div class="container">

<h1 class="page-title">Batch Details</h1>


<div class="student-layout">


<!-- LEFT SIDE -->

<div class="student-form">

<h2>Batch Information</h2>

<h3 id="batchTitle"></h3>
<h3 id="facultyName"></h3>

<br>

<button class="create-btn" onclick="createAttendance()">
Create Attendance
</button>

<button class="create-btn" onclick="openAddStudents()">
Add Students
</button>

<button class="create-btn" onclick="openRemoveStudents()">
Remove Students
</button>

</div>



<!-- RIGHT SIDE -->

<div class="student-table">

<h2>Attendance History</h2>

<div class="actions">
  <input 
  type="text" 
  id="historySearch" 
  placeholder="Search attendance...">

  <button class="export-btn export-right" onclick="exportBatchFullPDF()">
  <b>Export PDF</b>
  </button>
</div>

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Topic</th>
<th>Action</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

</div>

<!-- ADD STUDENTS POPUP -->

<div id="overlay"></div>

<div id="studentPopup" style="display:none">

<h3>
Select Students (<span id="studentCount">0</span>)
</h3>

<input type="text" id="studentSearch" placeholder="Search student...">

<div class="select-all">
<input type="checkbox" id="selectAll">
<label for="selectAll">Select All Students</label>
</div>

<div id="studentList" class="students-container"></div>

<div class="save-container">
<button id="update" class="create-btn" onclick="saveBatchStudents()">
Save Students
</button>
</div>

</div>

<!-- REMOVE STUDENTS POPUP -->

<div id="removePopup" style="display:none">

<h3 style="margin-bottom:15px;color:#1e3a8a;font-weight:600;">
Remove Students (<span id="removeStudentCount">0</span>)
</h3>

<input type="text" id="removeSearch" placeholder="Search student...">

<div class="select-all">
<input type="checkbox" id="removeSelectAll">
<label for="removeSelectAll">Select All Students</label>
</div>

<div id="removeStudentList" class="students-container"></div>

<div class="save-container">
<button class="create-btn" onclick="removeBatchStudents()">
Remove Students
</button>
</div>

</div>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
  document.getElementById("footer").innerHTML = data
})
</script>

<script src="js/config.js"></script>
<script src="js/attendance.js"></script>


<script>
window.addEventListener("load", function(){

const batchId = localStorage.getItem("attendanceBatch");

fetch(API + "?action=getBatches")
.then(res => res.json())
.then(data => {

  const rows = data.slice(1);
  const batch = rows.find(r => r[0] === batchId);

  if(batch){

    document.getElementById("batchTitle").innerText =
    "Batch Name : " + batch[1];

    document.getElementById("facultyName").innerText =
    "Faculty Name : " + (batch[2] || "Not Assigned");

  }

});

loadBatchAttendance()

})
</script>


<script>

if(!localStorage.getItem("user")){
window.location="index.html"
}

</script>

</body>
</html>
