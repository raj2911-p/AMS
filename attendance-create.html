<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Attendance</title>

<link rel="stylesheet" href="css/attendance-create_style.css">

</head>

<body>

<div class="navbar">

<a href="dashboard.html" class="logo-card">
    <img src="logo.png" alt="Logo">
</a>

<div class="title">
Attendance Management System
</div>

<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="batches.html">Batches</a>
</div>

</div>


<div class="container">

<h1 class="page-title">Create Attendance</h1>


<div class="student-layout">


<!-- LEFT SIDE : ATTENDANCE DETAILS -->

<div class="student-form">

<h2>Attendance Details</h2>

<h3 id="batchName"></h3>
<h3 id="facultyName"></h3>

<label>Date</label>
<input type="date" id="attDate">

<label>Start Time</label>
<input type="time" id="attStartTime">

<label>End Time</label>
<input type="time" id="attEndTime">

<label>Topic Taught</label>
<input type="text" id="attTopic" placeholder="Topic Taught">

</div>



<!-- RIGHT SIDE : MARK ATTENDANCE -->

<div class="student-table">

<h2>Mark Attendance</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Present</th>
<th>Absent</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

<button class="create-btn" onclick="submitAttendance()">
Submit Attendance
</button>

</div>


</div>

</div>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
  document.getElementById("footer").innerHTML = data
})
</script>

<script src="js/config.js"></script>
<script src="js/attendance.js"></script>


<script>

window.onload = function(){

const batchId = localStorage.getItem("attendanceBatch")

let today = new Date()

let yyyy = today.getFullYear()
let mm = String(today.getMonth()+1).padStart(2,'0')
let dd = String(today.getDate()).padStart(2,'0')

document.getElementById("attDate").value = `${yyyy}-${mm}-${dd}`

let hours = String(today.getHours()).padStart(2,'0')
let minutes = String(today.getMinutes()).padStart(2,'0')

document.getElementById("attStartTime").value = `${hours}:${minutes}`


fetch(API + "?action=getBatches")
.then(res => res.json())
.then(data => {

data.slice(1).forEach(batch => {

if(batch[0] == batchId){

document.getElementById("batchName").innerText = "Batch Name : " + batch[1]

document.getElementById("facultyName").innerText =
"Faculty Name : " + (batch[2] || "Not Assigned")

}

})

})

loadBatchStudents()

}

</script>

<script>

if(!localStorage.getItem("user")){
window.location="index.html"
}

</script>

<script>
    document.addEventListener("input", function(e){

    if(e.target.id === "attTopic"){

        let pos = e.target.selectionStart

        let value = e.target.value

        value = value
        .split(" ")
        .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
        .join(" ")

        e.target.value = value

        e.target.setSelectionRange(pos,pos)
    }

    /* REMOVE ERROR */

    if(e.target.value.trim()){
        e.target.classList.remove("error-input")
    }

})

document.addEventListener("change", function(e){

    // 🎯 ONLY RADIO BUTTONS
    if(e.target.type === "radio"){

        let row = e.target.closest("tr")

        if(row){
            row.style.background = ""   // ✅ remove red
        }

    }

})
</script>

</body>
</html>
