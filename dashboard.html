<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="css/dashboard_style.css">

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<a href="dashboard.html" class="logo-card">
    <img src="logo.png" alt="Logo">
</a>

<div class="title">
Attendance Management System
</div>

<div class="nav-links">

<a href="dashboard.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="batches.html">Batches</a>

<div class="admin" id="adminBox">

<div class="logo-card nav-img">

    <div class="nav-img-wrapper">

        <div class="nav-loader" id="navLoader">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <img id="navProfileImg" style="display:none;">

    </div>
    <span id="adminName" style="color: #1e3a8a; font-weight: 600;"></span>

</div>

<!-- DROPDOWN -->
<div id="dropdown" class="dropdown">
    <p onclick="openProfile()">👤 Profile</p>
    <p onclick="logout()">🚪 Logout</p>
</div>

</div>

</div>

</div>

<!-- ================= DATE TIME ================= -->

<div class="datetime" id="datetime"></div>

<!-- ============ 🎂 TODAY BIRTHDAYS ============= -->
 
<div class="birthday-box">
    <div style="display:flex; align-items:center; gap:15px;"><img class="img1" src="party.png"><h2>Today's Birthday Students</h2></div>
    <div id="birthdayList" style="margin-top: 20px; font-weight: 600;">Loading...</div>
</div>

<!-- ================= MAIN LAYOUT ================= -->

<div class="dashboard-container">

<!-- LEFT SIDE STATS -->

<div class="left-section">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Total Batches</h3>
<p id="totalBatches">0</p>
</div>

<div class="card">
<h3>Present Today</h3>
<p id="presentToday">0</p>
</div>

<div class="card">
<h3>Absent Today</h3>
<p id="absentToday">0</p>
</div>

</div>

<!-- RIGHT SIDE CHART -->

<div class="right-section">

<h2>Batch Wise Students</h2>

<canvas id="batchChart"></canvas>

</div>

</div>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
  document.getElementById("footer").innerHTML = data
})
</script>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

<script>

if(!localStorage.getItem("user")){
window.location="index.html"
}

</script>

</body>
</html>
