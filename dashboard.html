<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="css/dashboard_style.css">

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<div class="logo">AMS</div>

<div class="title">
Attendance Management System
</div>

<div class="nav-links">

<a href="dashboard.html">Dashboard</a>
<a href="students.html">Students</a>
<a href="batches.html">Batches</a>

<div class="admin" id="adminBox">

<img src="https://i.pravatar.cc/40">

<span id="adminName"></span>

<!-- DROPDOWN -->
<div id="dropdown" class="dropdown">
    <p onclick="openProfile()">👤 Profile</p>
    <p onclick="logout()">🚪 Logout</p>
</div>

</div>

</div>

</div>

<!-- ================= DATE TIME ================= -->

<div class="datetime" id="datetime"></div>

<!-- ============ 🎂 TODAY BIRTHDAYS ============= -->
 
<div class="birthday-box">
    <h2>🎂 Today's Birthdays</h2>
    <div id="birthdayList">Loading...</div>
</div>

<!-- ================= MAIN LAYOUT ================= -->

<div class="dashboard-container">

<!-- LEFT SIDE STATS -->

<div class="left-section">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Total Batches</h3>
<p id="totalBatches">0</p>
</div>

<div class="card">
<h3>Present Today</h3>
<p id="presentToday">0</p>
</div>

<div class="card">
<h3>Absent Today</h3>
<p id="absentToday">0</p>
</div>

</div>

<!-- RIGHT SIDE CHART -->

<div class="right-section">

<h2>Batch Wise Students</h2>

<canvas id="batchChart"></canvas>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

<script>

if(!localStorage.getItem("user")){
window.location="login.html"
}

</script>

</body>
</html>
