<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="css/login_style.css">

</head>

<body>

<div class="login-box">

<!-- LOGO -->
<img src="logo.png" class="logo">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<h4 class="forgot-link" style="text-align: left; color: blue; margin-top: 10px;" onclick="openForgot()">Forgot Password ?</h4>

<button onclick="login()"><b>Login</b></button>

<button onclick="register()"><b>Create Faculty Login</b></button>

<p id="msg"></p>

</div>

<!-- ✅ ADMIN VERIFY MODAL -->
<div id="adminModal" class="modal">
  <div class="modal-card">
    <h3>Admin Verification</h3>

    <input id="adminUser" placeholder="Enter Admin Username">
    <input id="adminPass" type="password" placeholder="Enter Admin Password">

    <div class="modal-buttons">
      <button onclick="verifyAdmin()">OK</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- 🔐 FORGOT PASSWORD MODAL -->
<div id="forgotModal" class="modal">
  <div class="modal-card">
    <h3>Reset Password</h3>

    <!-- STEP 1 -->
    <div id="step1">
      <input id="fpUsername" placeholder="Enter Username">
      <button onclick="sendOTP()">Send OTP</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" style="display:none;">
      <input id="fpOtp" placeholder="Enter OTP">
      <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" style="display:none;">
      <input id="fpNewPass" type="password" placeholder="New Password">
      <button onclick="resetPassword()">Reset Password</button>
    </div>

    <br>
    <button onclick="closeForgot()">Cancel</button>
  </div>
</div>

<script src="js/config.js"></script>

<script>
function login(){

let username=document.getElementById("username").value.trim()
let password=document.getElementById("password").value.trim()

if(!username || !password){
document.getElementById("msg").innerText="All fields required"
return
}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:username,
password:password
})
})
.then(res=>res.json())
.then(data=>{

if(data.status=="success"){

localStorage.setItem("user",data.username.trim())
localStorage.setItem("role",data.role)

localStorage.removeItem("createMode")   // ✅ ADD THIS
window.location="dashboard.html"

}
else if(data.status=="pending"){

document.getElementById("msg").innerText="Waiting for Admin Approval"

}
else{

document.getElementById("msg").innerText="Invalid Login"

}

})
}

/* REGISTER */
function register(){

document.getElementById("adminModal").classList.add("show")

if(!adminUser || !adminPass){
alert("Admin credentials required")
return
}

/* VERIFY ADMIN FIRST */
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:adminUser,
password:adminPass
})
})
.then(res=>res.json())
.then(res=>{

if(res.status=="success" && res.role=="Admin"){

/* OPEN PROFILE PAGE IN CREATE MODE */
localStorage.setItem("createMode","true")
window.location="profile.html"

}else{
alert("Invalid Admin Credentials ❌")
}

})

}

/* FORGOT PASSWORD */
function forgot(){

let username = prompt("Enter Username")

if(!username){
alert("Username required")
return
}

/* SEND OTP */
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sendOTP",
username:username
})
})
.then(res=>res.json())
.then(res=>{

console.log("OTP RESPONSE:", res)   // 🔥 ADD THIS

if(res.status !== "sent"){
alert(res.message || "Error ❌")
return
}

let otp = prompt("Enter OTP")

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"verifyOTP",
username:username,
otp:otp
})
})
.then(r=>r.json())
.then(v=>{

if(v.status === "expired"){
alert("OTP expired ❌")
return
}

if(v.status === "blocked"){
alert("Too many attempts ❌")
return
}

if(v.status !== "verified"){
alert("Invalid OTP ❌")
return
}

/* RESET PASSWORD */
if(v.status === "verified"){

let newPass = prompt("Enter New Password (min 8 characters)")

if(!newPass || newPass.trim().length < 8){
alert("Password must be at least 8 characters ❌")
return
}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"forgotPassword",
username:username,
newPassword:newPass
})
})
.then(r=>r.json())
.then(d=>{
if(d.status=="success"){
alert("Password Reset Successful ✅")
closeForgotModal() 
}else{
alert("Error ❌")
}
})

}

})

})
}

function closeModal(){
document.getElementById("adminModal").classList.remove("show")

document.getElementById("adminUser").value = ""
document.getElementById("adminPass").value = ""
}

function verifyAdmin(){

let adminUser = document.getElementById("adminUser").value.trim()
let adminPass = document.getElementById("adminPass").value.trim()

if(!adminUser || !adminPass){
alert("All fields required")
return
}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:adminUser,
password:adminPass
})
})
.then(res=>res.json())
.then(res=>{

if(res.status=="success" && res.role=="Admin"){

document.getElementById("adminUser").value = ""
document.getElementById("adminPass").value = ""

closeModal()

localStorage.setItem("createMode","true")
window.location="profile.html"

}else{
alert("Invalid Admin Credentials ❌")
}

})
}

let fpUser = ""

/* OPEN MODAL */
function openForgot(){
document.getElementById("forgotModal").classList.add("show")
resetForgotModal()   // ✅ bas ye hi kaafi hai
}

/* CLOSE */
function closeForgot(){
document.getElementById("forgotModal").classList.remove("show")
resetForgotModal()
}

/* SEND OTP */
function sendOTP(){

fpUser = document.getElementById("fpUsername").value
.toLowerCase()
.replace(/\s/g,"")
.trim()

if(!fpUser){
alert("Enter username ❌")
return
}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"sendOTP",
username:fpUser
})
})
.then(res=>res.json())
.then(res=>{

console.log(res)

if(res.status !== "sent"){
alert(res.message || "Error ❌")
return
}

/* NEXT STEP */
document.getElementById("step1").style.display="none"
document.getElementById("step2").style.display="block"

})
}

/* VERIFY OTP */
function verifyOTP(){

let otp = document.getElementById("fpOtp").value.trim()

if(!otp){
alert("Enter OTP ❌")
return
}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"verifyOTP",
username:fpUser,
otp:otp
})
})
.then(res=>res.json())
.then(res=>{

if(res.status === "expired"){
alert("OTP expired ❌")
return
}

if(res.status === "blocked"){
alert("Too many attempts ❌")
return
}

if(res.status !== "verified"){
alert("Invalid OTP ❌")
return
}

document.getElementById("fpOtp").value = ""

/* NEXT STEP */
document.getElementById("step2").style.display="none"
document.getElementById("step3").style.display="block"

})
}

/* RESET PASSWORD */
function resetPassword(){

let newPass = document.getElementById("fpNewPass").value.trim()

if(!newPass || newPass.length < 8){
alert("Min 8 characters ❌")
return
}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"forgotPassword",
username:fpUser,
newPassword:newPass
})
})
.then(res=>res.json())
.then(res=>{

if(res.status=="success"){
document.getElementById("fpNewPass").value = ""
alert("Password Reset Successful ✅")
closeForgot()
}else{
alert("Error ❌")
}

})
}

function resetForgotModal(){

// ✅ correct IDs use karo
document.getElementById("fpUsername").value = ""
document.getElementById("fpOtp").value = ""
document.getElementById("fpNewPass").value = ""

// reset steps
document.getElementById("step1").style.display = "block"
document.getElementById("step2").style.display = "none"
document.getElementById("step3").style.display = "none"

// reset user
fpUser = ""

}
</script>

</body>

</html>
